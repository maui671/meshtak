<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MeshTAK</title>
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div>
        <h1>MeshTAK</h1>
        <p class="subtitle">Meshtastic bridge, TAK forwarding, HTTPS status UI, and live messaging</p>
      </div>

      <div class="status-cluster">
        <div class="status-card">
          <div class="status-label">TAK</div>
          <div id="takStatus" class="status-value">UNKNOWN</div>
        </div>
      </div>
    </header>

    <main class="grid">
      <section class="card card-map">
        <div class="card-header">
          <h2>Live Map</h2>
        </div>
        <div id="map"></div>
      </section>

      <section class="card card-send">
        <div class="card-header">
          <h2>Send Message</h2>
        </div>

        <div class="form-stack">
          <label>
            <span>Message</span>
            <textarea id="msgText" rows="5" placeholder="Enter message text"></textarea>
          </label>

          <label>
            <span>Destination</span>
            <input id="msgDest" type="text" placeholder="broadcast or !nodeid" value="broadcast">
          </label>

          <div class="button-row">
            <button type="button" onclick="sendMessage()">Send</button>
          </div>
        </div>
      </section>

      <section class="card card-config">
        <div class="card-header">
          <h2>TAK Forwarding</h2>
        </div>

        <form id="takForm" class="form-stack" onsubmit="event.preventDefault(); saveTakConfig();">
          <label class="checkbox-row">
            <span>Enable TAK Forwarding</span>
            <input id="takEnabled" type="checkbox">
          </label>

          <label>
            <span>TAK Host</span>
            <input id="takHost" type="text" placeholder="tak-server.local or 10.0.0.5">
          </label>

          <label>
            <span>TAK Port</span>
            <input id="takPort" type="number" min="1" max="65535" step="1" value="8088">
          </label>

          <div class="button-row">
            <button type="submit">Save TAK Settings</button>
          </div>
        </form>
      </section>

      <section class="card card-messages">
        <div class="card-header">
          <h2>Message Log</h2>
        </div>
        <div id="messageLog" class="message-log"></div>
      </section>

      <section class="card card-nodes">
        <div class="card-header">
          <h2>Observed Nodes</h2>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Callsign</th>
                <th>Node ID</th>
                <th>Latitude</th>
                <th>Longitude</th>
                <th>Last Seen</th>
              </tr>
            </thead>
            <tbody id="nodeTableBody">
              <tr>
                <td colspan="5">Waiting for node data...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
